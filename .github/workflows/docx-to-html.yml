name: Convert DOCX to PDF

on:
  push:
    branches:
      - main

jobs:
  convert:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-lang-spanish

      - name: Convert DOCX to PDF
        run: |
          for file in $(find . -name "*.docx"); do
            filename=$(basename "$file" .docx)
            echo "Converting $file..."
            pandoc "$file" -o "${file%.docx}.pdf" \
              --pdf-engine=xelatex \
              --metadata title="$filename" \
              -V geometry:margin=2cm \
              -V lang=es || echo "Skipping $file (error)"
          done

      - name: Commit PDF files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add **/*.pdf
          git diff --cached --quiet || git commit -m "docs: auto-convert DOCX to PDF"
          git push
