<nav class="bg-slate-800 border-b border-slate-700 px-4 sm:px-6 py-3 sm:py-4 sticky top-0 z-10">
  <div class="max-w-7xl mx-auto flex items-center justify-between gap-2">

    <!-- Logo -->
    <p class="text-base sm:text-lg font-semibold text-white shrink-0">
      <span class="text-blue-400">Rovimatica</span>
      <span class="hidden sm:inline"> PaqTracer</span>
    </p>

    <!-- Usuario + acciones -->
    <div class="flex items-center gap-2 sm:gap-4 min-w-0">

      <!-- Estado + email + rol -->
      <div class="flex items-center gap-2 min-w-0">
        <span class="w-2 h-2 bg-green-400 rounded-full shrink-0"></span>
        <span class="text-slate-400 text-sm hidden sm:block truncate max-w-45">{{ correoUser }}</span>
        <span class="text-slate-600 hidden sm:block">|</span>
        <!-- Badge de rol: visible siempre pero compacto en móvil -->
        <span class="text-xs text-blue-400 font-medium uppercase tracking-wide bg-blue-400/10 px-1.5 py-0.5 rounded sm:bg-transparent sm:px-0 sm:py-0">
          {{ rolUser }}
        </span>
      </div>

      <!-- Botones de idioma -->
      <div class="flex items-center gap-1 shrink-0">
        <button
          (click)="setLang('es')"
          [class.ring-2]="currentLang() === 'es'"
          [class.ring-blue-400]="currentLang() === 'es'"
          title="Español"
          class="text-xs font-semibold px-2 py-1 rounded-lg transition-all duration-200
                 bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white">
          ES
        </button>
        <button
          (click)="setLang('en')"
          [class.ring-2]="currentLang() === 'en'"
          [class.ring-blue-400]="currentLang() === 'en'"
          title="English"
          class="text-xs font-semibold px-2 py-1 rounded-lg transition-all duration-200
                 bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white">
          EN
        </button>
      </div>

      <!-- Botón: Búsqueda de paquete -->
      @if ((rolUser === 'superadmin' || rolUser === 'admin') && rutaActual() !== '/busqueda') {
      <button
        (click)="redirigirBuscar()"
        [title]="'nav.search' | translate"
        class="flex items-center gap-1.5 text-sm bg-slate-700 hover:bg-green-600 text-slate-300 hover:text-white
               px-2 py-1.5 sm:px-3 rounded-lg transition-all duration-200 shrink-0">
        <!-- Icono búsqueda -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
        <span class="hidden sm:inline">{{ 'nav.search' | translate }}</span>
      </button>
      }

      <!-- Botón: Vuelta a Dashboard -->
      @if (rutaActual() === '/busqueda' && rolUser !== 'usuario') {
      <button
        (click)="redirigirDashboard()"
        [title]="'nav.dashboard' | translate"
        class="flex items-center gap-1.5 text-sm bg-slate-700 hover:bg-green-600 text-slate-300 hover:text-white
               px-2 py-1.5 sm:px-3 rounded-lg transition-all duration-200 shrink-0">
        <!-- Icono home -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7m-9 2v8m4-8v8m-4 0h4"/>
        </svg>
        <span class="hidden sm:inline">{{ 'nav.dashboard' | translate }}</span>
      </button>
      }

      <!-- Botón: Salir -->
      <button
        (click)="cerrarSesion()"
        [title]="'nav.logout' | translate"
        class="flex items-center gap-1.5 text-sm bg-slate-700 hover:bg-red-600 text-slate-300 hover:text-white
               px-2 py-1.5 sm:px-3 rounded-lg transition-all duration-200 shrink-0">
        <!-- Icono logout -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1"/>
        </svg>
        <span class="hidden sm:inline">{{ 'nav.logout' | translate }}</span>
      </button>

    </div>
  </div>
</nav>
