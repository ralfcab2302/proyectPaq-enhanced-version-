name: Convert DOCX to HTML

on:
  push:
    branches:
      - main

jobs:
  convert:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Convert DOCX to HTML
        run: |
          for file in $(find . -name "*.docx"); do
            pandoc "$file" -o "${file%.docx}.html" --standalone
          done

      - name: Commit HTML files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add **/*.html
          git diff --cached --quiet || git commit -m "docs: auto-convert DOCX to HTML"
          git push
